<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>陪你说说话</title>
  <style>
    :root {
      --bg: #f3efe7;
      --card: #fffaf2;
      --line: #d6cfc0;
      --text: #2f241d;
      --muted: #7d6c5d;
      --accent: #c96f3a;
      --accent-dark: #a95728;
      --user: #f6d7c2;
      --assistant: #fdf5de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 111, 58, 0.18), transparent 32%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }
    .sub {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }
    .panel {
      border: 1px solid var(--line);
      background: rgba(255, 250, 242, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(73, 44, 22, 0.08);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #68a55f;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { background: var(--accent-dark); }
    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .chat {
      min-height: 480px;
      max-height: 62vh;
      overflow-y: auto;
      padding: 18px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .assistant {
      align-self: flex-start;
      background: var(--assistant);
    }
    .user {
      align-self: flex-end;
      background: var(--user);
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 14px 16px 18px;
      background: rgba(255,255,255,0.7);
    }
    textarea {
      width: 100%;
      min-height: 96px;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 14px;
      resize: vertical;
      font: inherit;
      color: inherit;
      background: #fffdf9;
    }
    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 680px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .bubble {
        max-width: 92%;
      }
      .composer-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .composer-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1>陪你说说话</h1>
        <div class="sub">先把连续聊天跑通。当前这版只做对话、记忆和公众号接入，不接下单工具。</div>
      </div>
      <div class="badge"><span class="dot"></span><span id="health-text">检查服务中...</span></div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div class="badge">会话：<span id="session-id">未创建</span></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn ghost" id="new-session-btn" type="button">新会话</button>
          <a class="btn ghost" href="/admin">后台</a>
          <button class="btn" id="reload-btn" type="button">刷新历史</button>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <textarea id="message-input" placeholder="比如：今天有点累，想找个人聊两句。"></textarea>
        <div class="composer-actions">
          <div class="hint">Enter 发送，Shift + Enter 换行。</div>
          <button class="btn" id="send-btn" type="button">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const reloadBtn = document.getElementById("reload-btn");
    const newSessionBtn = document.getElementById("new-session-btn");
    const sessionIdEl = document.getElementById("session-id");
    const healthTextEl = document.getElementById("health-text");
    const sessionKey = "wechat-agent-ordering-session-id";

    let sessionId = localStorage.getItem(sessionKey) || "";

    function renderBubble(role, text) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;
      chatEl.appendChild(bubble);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function resetChat() {
      chatEl.innerHTML = "";
    }

    function setSession(nextSessionId) {
      sessionId = nextSessionId || "";
      if (sessionId) {
        localStorage.setItem(sessionKey, sessionId);
      } else {
        localStorage.removeItem(sessionKey);
      }
      sessionIdEl.textContent = sessionId || "未创建";
    }

    async function loadHealth() {
      const response = await fetch("/api/health");
      const data = await response.json();
      if (data.api_key_configured) {
        const replyMode = data.wechat_official_active_reply_enabled ? "公众号主动回发已开" : "公众号被动回复模式";
        healthTextEl.textContent = `服务正常 / ${data.provider} / ${data.model} / ${replyMode}`;
        return;
      }
      healthTextEl.textContent = "服务正常，但还没配置模型 API Key";
    }

    async function loadSessionHistory() {
      if (!sessionId) {
        resetChat();
        renderBubble("assistant", "新会话还没开始。你可以直接发第一句话。");
        return;
      }

      const response = await fetch(`/api/sessions/${sessionId}`);
      if (!response.ok) {
        setSession("");
        resetChat();
        renderBubble("assistant", "原来的会话没找到，我帮你切到新会话了。");
        return;
      }

      const data = await response.json();
      resetChat();
      if (!data.turns.length) {
        renderBubble("assistant", "新会话已创建。你想聊什么，我在。");
        return;
      }
      for (const turn of data.turns) {
        renderBubble(turn.role, turn.text);
      }
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      renderBubble("user", message);
      sendBtn.disabled = true;
      sendBtn.textContent = "发送中...";

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message })
      });

      const data = await response.json();
      sendBtn.disabled = false;
      sendBtn.textContent = "发送";

      if (!response.ok) {
        renderBubble("assistant", `出错了：${data.message || data.error || "unknown error"}`);
        if (data.session_id) setSession(data.session_id);
        return;
      }

      setSession(data.session_id);
      renderBubble("assistant", data.assistant_message);
    }

    sendBtn.addEventListener("click", sendMessage);
    reloadBtn.addEventListener("click", loadSessionHistory);
    newSessionBtn.addEventListener("click", async () => {
      const response = await fetch("/api/sessions", { method: "POST" });
      const data = await response.json();
      setSession(data.session_id);
      resetChat();
      renderBubble("assistant", "新会话已创建。你想聊什么，我在。");
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    (async () => {
      setSession(sessionId);
      await loadHealth();
      await loadSessionHistory();
    })();
  </script>
</body>
</html>
