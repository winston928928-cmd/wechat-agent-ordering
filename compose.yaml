services:
  app:
    build:
      context: .
    container_name: wechat-agent-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8787
    volumes:
      - ./data:/app/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    container_name: wechat-agent-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
